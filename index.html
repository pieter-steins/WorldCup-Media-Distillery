<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{

body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--ink);min-height:100vh}
.hdr{background:var(--dark);padding:1.4rem 1rem .9rem;text-align:center;border-bottom:1px solid var(--dark2)}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,6vw,3.4rem);letter-spacing:.04em;color:#fff;line-height:1}

.hdr p{color:#8fa3b8;font-size:.75rem;margin-top:.25rem;font-weight:300}
.nav{background:var(--dark);display:flex;justify-content:center;border-bottom:1px solid var(--dark2);flex-wrap:wrap;position:sticky;top:0;z-index:100}
.nb{background:none;border:none;color:#8fa3b8;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;padding:.65rem .9rem;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}

.main{background:var(--surface);min-height:calc(100vh - 110px)}
.scr{padding:1.1rem;max-width:860px;margin:0 auto;display:none}
.scr.on{display:block}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:.9rem 1.1rem;margin-bottom:.9rem}
.infob{background:var(--blue-l);border:1px solid #B5D4F4;border-radius:10px;padding:.65rem .9rem;font-size:.78rem;color:var(--blue-d);margin-bottom:.9rem;line-height:1.6}
.warnb{background:var(--amber-l);border:1px solid var(--amber);border-radius:10px;padding:.65rem .9rem;font-size:.78rem;color:var(--amber-d);margin-bottom:.9rem;line-height:1.6}
.namebar{display:flex;align-items:center;gap:10px}
.namebar label{font-size:.75rem;color:var(--muted);white-space:nowrap}
.namebar input{flex:1;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;color:var(--ink);background:transparent}
.namebar input::placeholder{color:#c5cdd6;font-weight:300}
.pm{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:4px}
.pt{height:4px;background:var(--border);border-radius:3px;overflow:hidden}
.pf{height:100%;background:var(--green);border-radius:3px;transition:width .4s}
.leg{display:flex;gap:.6rem;margin-bottom:.9rem;flex-wrap:wrap;font-size:.7rem;color:var(--muted);align-items:center}
.ld{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:9px}
.gc{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.gh{background:var(--ink);padding:6px 11px;display:flex;align-items:center;justify-content:space-between}
.gh span{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.06em;color:#fff}
.gbs{display:flex;gap:3px}
.gb{width:15px;height:15px;border-radius:50%;font-size:8px;font-weight:500;display:flex;align-items:center;justify-content:center;background:#2c3d4e;color:#5a7a95;transition:all .2s}
.gb.w{background:var(--green);color:#fff}
.gb.r{background:var(--blue);color:#fff}
.tr{display:flex;align-items:center;gap:8px;padding:7px 11px;cursor:pointer;border-top:1px solid var(--border);transition:background .12s;user-select:none}
.tr:first-of-type{border-top:none}
.tr:hover{background:#f3f4f6}
.tf{font-size:1rem;width:19px;text-align:center;flex-shrink:0}
.tn{flex:1;font-size:.78rem;color:var(--ink)}
.pd{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:transparent;transition:all .15s;flex-shrink:0}
.pd.w{background:var(--green);border-color:var(--green);color:#fff}
.pd.r{background:var(--blue);border-color:var(--blue);color:#fff}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.9rem}
.filt{border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-family:'DM Sans',sans-serif;font-size:.72rem;cursor:pointer;background:var(--white);color:var(--muted);transition:all .15s}
.filt.on{background:var(--ink);border-color:var(--ink);color:#fff}
.day-block{margin-bottom:1.2rem}
.day-hdr{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.05em;color:var(--ink);padding:.5rem .2rem .4rem;border-bottom:2px solid var(--ink);margin-bottom:.6rem;display:flex;align-items:baseline;gap:.6rem}
.day-hdr small{font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:400;color:var(--muted);letter-spacing:0}
.mc{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:.65rem .9rem;margin-bottom:.45rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.mc-grp{font-size:.63rem;font-weight:500;color:var(--muted);width:50px;flex-shrink:0;text-transform:uppercase;letter-spacing:.05em}
.mc-teams{flex:1;display:flex;align-items:center;gap:.35rem;min-width:170px}
.mc-team{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--ink)}
.mc-vs{font-size:.63rem;color:#9ca3af;font-weight:500;padding:0 2px}
.mc-preds{display:flex;gap:.35rem;align-items:center;flex-shrink:0}
.pb{border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-family:'DM Sans',sans-serif;font-size:.72rem;cursor:pointer;background:var(--white);color:var(--muted);transition:all .15s;white-space:nowrap}
.pb:hover{border-color:#9ca3af;color:var(--ink)}
.pb.h{background:var(--green-l);border-color:var(--green);color:var(--green-d);font-weight:500}
.pb.d{background:var(--blue-l);border-color:var(--blue);color:var(--blue-d);font-weight:500}
.pb.a{background:var(--coral-l);border-color:var(--coral);color:var(--coral-d);font-weight:500}
.pb.sel{background:var(--amber-l);border-color:var(--amber);color:var(--amber-d);font-weight:500}
.mc-venue{font-size:.63rem;color:#9ca3af;width:100%;padding-top:2px;padding-left:58px}
/* knockout */
.ko-round{margin-bottom:1.5rem}
.ko-round-hdr{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.05em;color:var(--ink);padding:.5rem .2rem .35rem;border-bottom:2px solid var(--ink);margin-bottom:.7rem;display:flex;align-items:baseline;gap:.6rem}

.ko-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:.65rem .9rem;margin-bottom:.45rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.ko-label{flex:1;font-size:.82rem;color:var(--ink);min-width:160px}
.ko-label .team-name{font-weight:500}
.ko-label .bracket-label{color:var(--muted);font-size:.75rem;font-style:italic}
.ko-btns{display:flex;gap:.35rem;flex-shrink:0;flex-wrap:wrap}
.ko-btn{border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-family:'DM Sans',sans-serif;font-size:.72rem;cursor:pointer;background:var(--white);color:var(--muted);transition:all .15s;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.ko-btn:hover{border-color:#9ca3af;color:var(--ink)}
.ko-btn.sel{background:var(--amber-l);border-color:var(--amber);color:var(--amber-d);font-weight:500}
.ko-venue{font-size:.63rem;color:#9ca3af;width:100%;padding-top:2px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px}
.cb{display:flex;align-items:center;gap:7px;padding:8px 11px;background:var(--white);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;color:var(--ink);text-align:left;transition:all .15s;width:100%}
.cb:hover{background:var(--surface);border-color:#c0c8d0}
.cb.sel{background:var(--amber-l);border-color:var(--amber);color:var(--amber-d);font-weight:500}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:.9rem}
.sc{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:.75rem .9rem}
.sl{font-size:.65rem;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.sv{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--ink);line-height:1}
.champ-box{background:var(--amber-l);border:1px solid var(--amber);border-radius:12px;padding:.8rem 1.1rem;display:flex;align-items:center;gap:12px;margin-bottom:.9rem}
.cf{font-size:2rem}
.cn{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--amber-d);letter-spacing:.04em;line-height:1}
.cs{font-size:.7rem;color:#854F0B;margin-top:2px}
.sec-title{font-size:.7rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.ptable{width:100%;border-collapse:collapse}
.ptable tr{border-bottom:1px solid var(--border)}
.ptable tr:last-child{border-bottom:none}
.ptable td{padding:7px 5px;font-size:.78rem;vertical-align:middle}
.grpc{color:var(--muted);font-size:.67rem;font-weight:500;width:50px}
.flgc{width:22px;font-size:.9rem}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.63rem;font-weight:500}
.bw{background:var(--green-l);color:var(--green-d)}
.br{background:var(--blue-l);color:var(--blue-d)}
.bh{background:var(--green-l);color:var(--green-d)}
.bd{background:var(--blue-l);color:var(--blue-d)}
.ba{background:var(--coral-l);color:var(--coral-d)}
.bk{background:var(--amber-l);color:var(--amber-d)}
.ebtn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:10px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:500;cursor:pointer;margin-top:.9rem;transition:background .15s}
.ebtn:hover{background:#2d3d4e}
.lbt{width:100%;border-collapse:collapse}
.lbt th{background:var(--ink);color:#8fa3b8;font-size:.65rem;font-weight:500;text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;text-align:left}
.lbt td{padding:8px 10px;font-size:.78rem;border-top:1px solid var(--border);vertical-align:middle}
.rnk{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;font-family:'Bebas Neue',sans-serif;font-size:.88rem;background:#f1efe8;color:var(--muted)}
.rnk.g{background:var(--amber-l);color:var(--amber-d)}
.rnk.s{background:#f1efe8;color:#444441}
.rnk.b{background:var(--coral-l);color:#993C1D}
.spts{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--ink)}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;margin-bottom:1rem}
.rc{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.rh{background:var(--ink);padding:5px 11px;font-family:'Bebas Neue',sans-serif;font-size:.88rem;letter-spacing:.06em;color:#fff}
.rr{display:flex;align-items:center;gap:7px;padding:6px 11px;border-top:1px solid var(--border)}
.rr select{flex:1;border:1px solid var(--border);border-radius:6px;padding:3px 5px;font-family:'DM Sans',sans-serif;font-size:.75rem;background:var(--white)}
.mr-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:.55rem .9rem;margin-bottom:.35rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.mr-teams{flex:1;display:flex;align-items:center;gap:.3rem;font-size:.75rem;color:var(--ink);min-width:150px}
.mr-score{display:flex;align-items:center;gap:.25rem;flex-shrink:0}
.si{width:38px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:3px 4px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500}
.ko-res-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:.55rem .9rem;margin-bottom:.35rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.ko-res-label{flex:1;font-size:.78rem;color:var(--ink);min-width:160px}
.ko-res-label em{font-style:normal;color:var(--muted);font-size:.7rem}
.sav{font-size:.66rem;color:var(--muted);text-align:right;margin-bottom:.4rem;min-height:.85rem;transition:color .2s}
.sav.ok{color:var(--green)}
.sav.err{color:#E24B4A}
.spin{display:inline-block;width:11px;height:11px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:3px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:#fff;padding:.6rem 1rem;border-radius:8px;font-size:.8rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
@media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr)}.scr{padding:.9rem}.nb{padding:.6rem .7rem;font-size:.7rem}}

/* ── Admin ── */
.admin-lock{text-align:center;padding:3rem 1rem}
.admin-lock h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.04em;color:var(--ink);margin-bottom:.5rem}
.admin-lock p{font-size:.85rem;color:var(--muted);margin-bottom:1.2rem}
.admin-lock input{border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:.95rem;text-align:center;width:200px;outline:none}
.admin-lock button{display:block;margin:.8rem auto 0;padding:9px 28px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.875rem;cursor:pointer}
.admin-lock .err{color:#E24B4A;font-size:.78rem;margin-top:.5rem}
.admin-panel{}
.admin-stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:1rem}
.participant-row{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--white);border:1px solid var(--border);border-radius:10px;margin-bottom:.45rem}
.participant-row:hover{background:#fafafa}
.p-name{flex:1;font-size:.875rem;font-weight:500;color:var(--ink)}
.p-meta{font-size:.72rem;color:var(--muted)}
.p-score{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--ink);width:40px;text-align:right}
.p-del{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:.72rem;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.p-del:hover{background:#FCEBEB;border-color:#E24B4A;color:#E24B4A}
.p-view{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:.72rem;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.p-view:hover{background:var(--blue-l);border-color:var(--blue);color:var(--blue-d)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--white);border-radius:14px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:1.5rem}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.04em;margin-bottom:1rem}
.modal-close{float:right;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted);margin-top:-4px}
.confirm-box{background:#FCEBEB;border:1px solid #E24B4A;border-radius:10px;padding:.9rem 1rem;margin-bottom:.9rem}
.confirm-box p{font-size:.85rem;color:#7A1515;margin-bottom:.75rem}
.confirm-btns{display:flex;gap:.5rem}
.confirm-btns button{padding:6px 18px;border-radius:7px;border:none;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer}
.btn-del-confirm{background:#E24B4A;color:#fff}
.btn-cancel{background:var(--surface);color:var(--ink);border:1px solid var(--border)!important;border:none}

</style>
</head>

    return;

    <div class="admin-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem">

function checkAdminPass(){
  const val = document.getElementById('adminPassInput')?.value;
  if(val === ADMIN_PASS){ adminUnlocked=true; renderAdminTab(); }
  else { const e=document.getElementById('adminErr'); if(e)e.textContent='Incorrect password.'; }
}

function checkResultsPass(){
  const val = document.getElementById('resultsPassInput')?.value;
  if(val === ADMIN_PASS){ resultsUnlocked=true; renderResultsTab(); refreshGroupResultsUI(); refreshMatchResultsUI(); refreshKoResultsUI(); }
  else { const e=document.getElementById('resultsErr'); if(e)e.textContent='Incorrect password.'; }
}

async function loadAdminData(){
  const rows = await SB.get('wc2026_picks','?order=updated_at.desc');
  if(!rows){ return; }
  adminParticipants = rows.filter(r=>r.name).map(r=>({
    id:r.id, name:r.name, picks:r.picks, mpreds:r.mpreds, kopreds:r.kopreds, champion:r.champion,
    updatedAt:r.updated_at,
    gc:r.picks?Object.values(r.picks).reduce((s,gp)=>s+Object.values(gp).filter(v=>v>0).length,0):0,
    mc:r.mpreds?Object.values(r.mpreds).filter(v=>v!=='').length:0,
    kc:r.kopreds?Object.values(r.kopreds).filter(v=>v!=='').length:0,
    score:calcScore(r)
  }));
  renderAdminStats();
  renderParticipantList();
}

function renderAdminStats(){
  const statsEl = document.getElementById('adminStats');
  if(!statsEl) return;
  const total = adminParticipants.length;
  const fullGroup = adminParticipants.filter(p=>p.gc===24).length;
  const fullMatch = adminParticipants.filter(p=>p.mc===72).length;
  const fullKO    = adminParticipants.filter(p=>p.kc===32).length;
  const hasChamp  = adminParticipants.filter(p=>p.champion).length;
  statsEl.innerHTML = `
    <div class="sc"><div class="sl">Participants</div><div class="sv">${total}</div></div>
    <div class="sc"><div class="sl">Group complete</div><div class="sv">${fullGroup}</div></div>
    <div class="sc"><div class="sl">Matches complete</div><div class="sv">${fullMatch}</div></div>
    <div class="sc"><div class="sl">KO complete</div><div class="sv">${fullKO}</div></div>
    <div class="sc"><div class="sl">Champion picked</div><div class="sv">${hasChamp}</div></div>`;
}

function renderParticipantList(){
  const el = document.getElementById('participantList');
  if(!el) return;
  if(adminParticipants.length===0){
    el.innerHTML='<div style="color:var(--muted);font-size:.85rem;font-style:italic;padding:.5rem 0">No participants yet.</div>';
    return;
  }
  const sorted=[...adminParticipants].sort((a,b)=>{
    if(a.score===null&&b.score===null)return a.name.localeCompare(b.name);
    if(a.score===null)return 1;if(b.score===null)return-1;return b.score-a.score;
  });
  el.innerHTML = sorted.map((p,i)=>`
    <div class="participant-row">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--muted);width:22px">${i+1}</span>
      <div style="flex:1">
        <div class="p-name">${p.name}</div>
        <div class="p-meta">Groups: ${p.gc}/24 · Matches: ${p.mc}/72 · KO: ${p.kc}/32 · Champion: ${p.champion||'—'} · Last updated: ${p.updatedAt?new Date(p.updatedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—'}</div>
      </div>
      <span class="p-score">${p.score!==null?p.score:'—'}</span>
      <button class="p-view" onclick="viewParticipantPicks('${p.id}')">&#128065; View</button>
      <button class="p-del" onclick="confirmDelete('${p.id}','${p.name.replace(/'/g,"\'")}')">&#10005; Delete</button>
    </div>`).join('');
}

function confirmDelete(id, name){
  confirmDeleteId = id;
  const area = document.getElementById('confirmArea');
  if(!area) return;
  area.innerHTML = `
    <div class="confirm-box">
      <p>Are you sure you want to delete <strong>${name}</strong>? This cannot be undone.</p>
      <div class="confirm-btns">
        <button class="btn-del-confirm" onclick="deleteParticipant()">Yes, delete</button>
        <button class="btn-cancel" onclick="cancelDelete()">Cancel</button>
      </div>
    </div>`;
  area.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function cancelDelete(){
  confirmDeleteId=null;
  const area=document.getElementById('confirmArea');
  if(area)area.innerHTML='';
}

async function deleteParticipant(){
  if(!confirmDeleteId) return;
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/wc2026_picks?id=eq.${confirmDeleteId}`,{
      method:'DELETE',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    if(r.ok||r.status===204){
      showToast('Participant deleted.');
      confirmDeleteId=null;
      const area=document.getElementById('confirmArea');if(area)area.innerHTML='';
      await loadAdminData();
    } else { showToast('Delete failed — try again.'); }
  } catch(e){ showToast('Delete failed.'); }
}

        <table class="ptable">${koRows||'<tr><td style="padding:.7rem;color:var(--muted);font-style:italic">No picks</td></tr>'}</table>
      </div>
      <div style="font-size:.72rem;color:var(--muted);text-align:right">Score: ${p.score!==null?p.score+' pts':'not yet calculated'} · Last updated: ${p.updatedAt?new Date(p.updatedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—'}</div>
    </div>`;
}

function exportCSV(){
  const sorted=[...adminParticipants].sort((a,b)=>{
    if(a.score===null&&b.score===null)return a.name.localeCompare(b.name);
    if(a.score===null)return 1;if(b.score===null)return-1;return b.score-a.score;
  });
  const rows=[['Rank','Name','Group Picks','Match Preds','KO Preds','Champion','Score','Last Updated']];
  sorted.forEach((p,i)=>{
    rows.push([i+1,p.name,p.gc+'/24',p.mc+'/72',p.kc+'/32',p.champion||'—',p.score!==null?p.score:'—',p.updatedAt?new Date(p.updatedAt).toLocaleString('en-GB'):'—']);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='wc2026_pool_standings.csv';a.click();
}


// ── INIT ──────────────────────────────────────────────────────────────
async function init(){
  buildGroupsTab();
  buildAdminTab();
  buildMatchesTab();
  buildKnockoutTab();
  buildChampionTab();
  buildSummaryTab();
  buildLeaderboardTab();
  buildResultsTab();

  await loadResults();
  updateProgress();

// ── LOAD / SAVE ───────────────────────────────────────────────────────
async function loadMyPicks(){
  const rows=await SB.get('wc2026_picks',`?id=eq.${myId}`);
  if(rows&&rows.length>0){
    const d=rows[0];
    document.getElementById('playerName').value=d.name||'';
    state.name=d.name||'';
    if(d.picks)Object.entries(d.picks).forEach(([g,gp])=>{if(state.picks[g])Object.entries(gp).forEach(([n,v])=>{if(n in state.picks[g])state.picks[g][n]=v;});});
    if(d.mpreds)Object.entries(d.mpreds).forEach(([id,v])=>{if(id in state.mpreds)state.mpreds[id]=v;});
    if(d.kopreds)Object.entries(d.kopreds).forEach(([id,v])=>{if(id in state.kopreds)state.kopreds[id]=v;});
    if(d.mscores)Object.entries(d.mscores).forEach(([id,v])=>{if(id in state.mscores)state.mscores[id]=v;});
    state.champion=d.champion||null;
    refreshAllGroups();
    renderMatchesList();
    renderKnockoutList();
    refreshChampGrid();
  }
}
async function loadResults(){
  const rows=await SB.get('wc2026_results','?id=eq.main');
  if(rows&&rows.length>0){
    const r=rows[0];
    results={groups:r.groups||{},matches:r.matches||{},ko:r.ko||{},champion:r.champion||''};
    refreshGroupResultsUI();
    refreshMatchResultsUI();
    refreshKoResultsUI();
    if(results.champion)document.getElementById('champResult').value=results.champion;
  }
}
function debounceSave(){
  state.name=document.getElementById('playerName').value;
  setSaving('saving');
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(saveMyPicks,800);
}
async function saveMyPicks(){
  const ok=await SB.upsert('wc2026_picks',{id:myId,name:state.name,picks:state.picks,mpreds:state.mpreds,mscores:state.mscores,kopreds:state.kopreds,champion:state.champion,updated_at:new Date().toISOString()});
  setSaving(ok?'ok':'err');
  setTimeout(()=>setSaving(''),2500);
}
async function saveResults(){
  await SB.upsert('wc2026_results',{id:'main',groups:results.groups,matches:results.matches,ko:results.ko,champion:results.champion,updated_at:new Date().toISOString()});
  setResSaving('ok');setTimeout(()=>setResSaving(''),2500);
}

function setSaving(s){const el=document.getElementById('savingInd');el.className='sav'+(s==='ok'?' ok':s==='err'?' err':'');el.innerHTML=s==='saving'?'<span class="spin"></span>Saving…':s==='ok'?'✓ Saved':s==='err'?'⚠ Save failed':'';}
function setResSaving(s){const el=document.getElementById('resSav');if(!el)return;el.className='sav'+(s==='ok'?' ok':'');el.innerHTML=s==='saving'?'<span class="spin"></span>Saving…':s==='ok'?'✓ Saved':'';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function buildGroupsTab(){
  const s=document.getElementById('tab-groups');
  s.innerHTML=`

      <div class="pm"><span id="progressLabel">0 of 120 picks made</span><span id="progressPct">0%</span></div>
      <div class="pt"><div class="pf" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="infob">
      <strong>Step 1 of 4 — Group stage picks.</strong> For each of the 12 groups, click the team you think will finish <strong>1st</strong> (green) and <strong>2nd</strong> (blue). First click = 1st place, second click = 2nd place, third click = clear. Make sure to enter your name above so you appear on the leaderboard.<br><br>
      🟢 Correct group winner = <strong>2 pts</strong> &nbsp;·&nbsp; 🔵 Correct runner-up = <strong>1 pt</strong>
    </div>
    <div class="leg">
      <span><span class="ld" style="background:var(--green)"></span>1st click = group winner (2 pts)</span>
      <span><span class="ld" style="background:var(--blue)"></span>2nd click = runner-up (1 pt)</span>
      <span><span class="ld" style="background:var(--border)"></span>3rd = clear</span>
    </div>
    <div class="gg" id="groupsGrid"></div>`;
  const grid=document.getElementById('groupsGrid');
  Object.entries(GROUPS).forEach(([g,teams])=>{
    const card=document.createElement('div');
    card.className='gc';card.id='gc-'+g;
    card.innerHTML=`<div class="gh"><span>Group ${g}</span><div class="gbs"><div class="gb" id="gb1-${g}">1</div><div class="gb" id="gb2-${g}">2</div></div></div>`+
      teams.map(([n,f])=>`<div class="tr" onclick="cycleTeam('${g}','${n.replace(/'/g,"\\'")}')"><span class="tf">${f}</span><span class="tn">${n}</span><div class="pd" id="pd-${g}-${n.replace(/[^a-zA-Z0-9]/g,'_')}"></div></div>`).join('');
    grid.appendChild(card);
  });
}
function cycleTeam(g,n){
  const gp=state.picks[g];const cur=gp[n];
  const teams=GROUPS[g].map(([t])=>t);
  const winners=teams.filter(t=>gp[t]===1);const runners=teams.filter(t=>gp[t]===2);
  if(cur===0){if(winners.length<1)gp[n]=1;else if(runners.length<1)gp[n]=2;else return;}
  else if(cur===1){gp[n]=2;const old=teams.find(t=>t!==n&&gp[t]===2);if(old)gp[old]=0;}
  else gp[n]=0;
  refreshGroup(g);updateProgress();debounceSave();
}
function refreshGroup(g){
  const gp=state.picks[g];const teams=GROUPS[g].map(([n])=>n);
  const hasW=teams.some(t=>gp[t]===1),hasR=teams.some(t=>gp[t]===2);
  const gb1=document.getElementById('gb1-'+g),gb2=document.getElementById('gb2-'+g);
  if(gb1)gb1.className='gb'+(hasW?' w':'');if(gb2)gb2.className='gb'+(hasR?' r':'');
  teams.forEach(n=>{const dot=document.getElementById(`pd-${g}-${n.replace(/[^a-zA-Z0-9]/g,'_')}`);if(dot){const v=gp[n];dot.className='pd'+(v===1?' w':v===2?' r':'');dot.textContent=v||'';}});
}
function refreshAllGroups(){Object.keys(GROUPS).forEach(g=>refreshGroup(g));}

function setMatchFilter(f){

function renderMatchesList(){
  const container=document.getElementById('matchesList');if(!container)return;

        const af=GROUPS[m.g]?.find(([n])=>n===m.a)?.[1]||'';

          <span class="mc-grp">Grp ${m.g}</span>
          <div class="mc-teams"><span class="mc-team"><span>${hf}</span>${m.h}</span><span class="mc-vs">vs</span><span class="mc-team"><span>${af}</span>${m.a}</span></div>

              <span style="font-size:.6rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Result</span>
              <div style="display:flex;gap:.35rem">
                <button class="pb${p==='h'?' h':''}" onclick="setPred('${m.id}','h')">H</button>
                <button class="pb${p==='d'?' d':''}" onclick="setPred('${m.id}','d')">D</button>
                <button class="pb${p==='a'?' a':''}" onclick="setPred('${m.id}','a')">A</button>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;margin-left:14px">
              <span style="font-size:.6rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Score</span>
              <div style="display:flex;align-items:center;gap:3px">
                <input type="number" min="0" max="20" value="${sh}" placeholder="0" style="width:32px;text-align:center;border:1px solid ${hasScore?'var(--amber)':'var(--border)'};border-radius:5px;padding:2px 3px;font-family:'DM Sans',sans-serif;font-size:.78rem;background:${hasScore?'var(--amber-l)':'var(--white)'}" oninput="setScore('${m.id}','h',this.value)" title="Home goals">
                <span style="font-size:.65rem;color:var(--muted)">:</span>
                <input type="number" min="0" max="20" value="${sa}" placeholder="0" style="width:32px;text-align:center;border:1px solid ${hasScore?'var(--amber)':'var(--border)'};border-radius:5px;padding:2px 3px;font-family:'DM Sans',sans-serif;font-size:.78rem;background:${hasScore?'var(--amber-l)':'var(--white)'}" oninput="setScore('${m.id}','a',this.value)" title="Away goals">
                ${hasScore?'<span style="font-size:.63rem;color:var(--amber-d);margin-left:2px">+2</span>':''}
              </div>
            </div>
          </div>
          <div class="mc-venue">${m.venue}</div>
        </div>`;
      }).join('')}
    </div>`).join('')||'<p style="color:var(--muted);font-size:.85rem;padding:.5rem 0">All picked!</p>';
}
function setPred(id,val){
  state.mpreds[id]=state.mpreds[id]===val?'':val;
  renderMatchesList();updateProgress();debounceSave();
  const u=document.getElementById('mf-unpicked');if(u)u.textContent='Unpicked ('+(72-Object.values(state.mpreds).filter(v=>v!=='').length)+')';
}
function setScore(id,side,val){
  if(!state.mscores[id])state.mscores[id]={h:'',a:''};
  state.mscores[id][side]=val===''?'':parseInt(val)||0;
  // auto-set H/D/A result based on score
  const h=state.mscores[id].h;const a=state.mscores[id].a;
  if(h!==''&&a!==''){
    const hi=parseInt(h),ai=parseInt(a);
    state.mpreds[id]=hi>ai?'h':hi<ai?'a':'d';
  }
  renderMatchesList();updateProgress();debounceSave();
}

// ── PROGRESS ──────────────────────────────────────────────────────────
function updateProgress(){
  const gc=Object.values(state.picks).reduce((s,gp)=>s+Object.values(gp).filter(v=>v>0).length,0);
  const mc=Object.values(state.mpreds).filter(v=>v!=='').length;
  const kc=Object.values(state.kopreds).filter(v=>v!=='').length;
  const cc=state.champion?1:0;
  const total=24+72+32+1;
  const done=gc+mc+kc+cc;
  const pct=Math.round(done/total*100);
  const pf=document.getElementById('progressFill');if(pf)pf.style.width=pct+'%';
  const pl=document.getElementById('progressLabel');if(pl)pl.textContent=done+' of '+total+' picks made';
  const pp=document.getElementById('progressPct');if(pp)pp.textContent=pct+'%';

  ).join('')||'<tr><td colspan="3" style="padding:.9rem;color:var(--muted);font-style:italic">No picks yet.</td></tr>';
}

// ── LEADERBOARD TAB ───────────────────────────────────────────────────
function buildLeaderboardTab(){
  document.getElementById('tab-leaderboard').innerHTML=`
    <div class="infob">Live standings — scores update automatically as results are entered. <button onclick="loadLeaderboard()" style="background:none;border:none;cursor:pointer;color:var(--blue-d);font-size:.75rem;text-decoration:underline;font-family:'DM Sans',sans-serif">Refresh</button></div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="lbt">
        <thead><tr><th style="width:36px">#</th><th>Name</th><th style="width:58px;text-align:center">Grp</th><th style="width:58px;text-align:center">Match</th><th style="width:58px;text-align:center">KO</th><th style="width:65px;text-align:center">Total</th></tr></thead>
        <tbody id="lbBody"><tr><td colspan="6" style="padding:1.5rem;text-align:center;color:var(--muted)"><span class="spin"></span> Loading…</td></tr></tbody>
      </table>
    </div>`;
}
function calcScore(d){
  let s=0;const hasRes=Object.keys(results.groups||{}).length>0||Object.keys(results.matches||{}).length>0||Object.keys(results.ko||{}).length>0||results.champion;
  if(!hasRes)return null;
  // Groups
  Object.keys(GROUPS).forEach(g=>{const r=results.groups?.[g];if(!r)return;const gp=d.picks?.[g]||{};const w=Object.entries(gp).find(([,v])=>v===1)?.[0];const ru=Object.entries(gp).find(([,v])=>v===2)?.[0];if(w&&r.winner===w)s+=2;if(ru&&r.runner===ru)s+=1;});
  // Matches
  MATCHES.forEach(m=>{
    const r=results.matches?.[m.id];
    if(!r||r.hg===undefined||r.ag===undefined||r.hg===''||r.ag==='')return;
    const pred=d.mpreds?.[m.id]||'';
    const hg=parseInt(r.hg),ag=parseInt(r.ag);
    const actual=hg>ag?'h':hg<ag?'a':'d';
    if(pred===actual){
      s+=1;
      // Bonus for exact score
      const ps=d.mscores?.[m.id];
      if(ps&&ps.h!==''&&ps.a!==''&&parseInt(ps.h)===hg&&parseInt(ps.a)===ag)s+=2;
    }
  });
  // Knockout
  KO_MATCHES.forEach(m=>{
    const r=results.ko?.[m.id];if(!r?.winner)return;
    const pred=d.kopreds?.[m.id]||'';if(pred!==r.winner)return;
    const pts={r32:2,r16:2,qf:3,sf:4,tp:5,f:5}[m.round]||2;
    s+=pts;
  });
  // Champion
  if(d.champion&&results.champion){
    if(d.champion===results.champion)s+=6;
    else{const allGroupPicks=Object.values(d.picks||{}).flatMap(gp=>Object.entries(gp).filter(([,v])=>v>0).map(([n])=>n));if(allGroupPicks.includes(results.champion))s+=3;}
  }
  return s;
}
async function loadLeaderboard(){
  const tbody=document.getElementById('lbBody');if(!tbody)return;
  tbody.innerHTML='<tr><td colspan="6" style="padding:1.5rem;text-align:center;color:var(--muted)"><span class="spin"></span> Loading…</td></tr>';
  const rows=await SB.get('wc2026_picks','?order=updated_at.desc');
  if(!rows){tbody.innerHTML='<tr><td colspan="6" style="padding:1.5rem;text-align:center;color:var(--muted)">Could not load.</td></tr>';return;}
  const entries=rows.filter(r=>r.name).map(r=>({
    id:r.id,name:r.name,picks:r.picks,mpreds:r.mpreds,kopreds:r.kopreds,champion:r.champion,
    gc:r.picks?Object.values(r.picks).reduce((s,gp)=>s+Object.values(gp).filter(v=>v>0).length,0):0,
    mc:r.mpreds?Object.values(r.mpreds).filter(v=>v!=='').length:0,
    kc:r.kopreds?Object.values(r.kopreds).filter(v=>v!=='').length:0,
    score:calcScore(r)
  })).sort((a,b)=>{if(a.score===null&&b.score===null)return a.name.localeCompare(b.name);if(a.score===null)return 1;if(b.score===null)return-1;return b.score-a.score;});
  if(entries.length===0){tbody.innerHTML='<tr><td colspan="6" style="padding:1.5rem;text-align:center;color:var(--muted);font-style:italic">No submissions yet.</td></tr>';return;}
  tbody.innerHTML=entries.map((e,i)=>{
    const rc=i===0&&e.score!==null?'g':i===1&&e.score!==null?'s':i===2&&e.score!==null?'b':'';
    const isMe=e.id===myId;
    return `<tr style="${isMe?'background:var(--amber-l)':''}">
      <td><span class="rnk ${rc}">${i+1}</span></td>
      <td style="font-weight:${isMe?500:400}">${e.name}${isMe?'<span style="font-size:.63rem;color:#854F0B;margin-left:5px">you</span>':''}</td>
      <td style="text-align:center;color:var(--muted);font-size:.73rem">${e.gc}/24</td>
      <td style="text-align:center;color:var(--muted);font-size:.73rem">${e.mc}/72</td>
      <td style="text-align:center;color:var(--muted);font-size:.73rem">${e.kc}/32</td>
      <td style="text-align:center">${e.score!==null?`<span class="spts">${e.score}</span>`:'<span style="color:#c0c8d0">—</span>'}</td>
    </tr>`;
  }).join('');
}

// ── RESULTS TAB ───────────────────────────────────────────────────────
let resultsUnlocked = false;

function buildResultsTab(){
  renderResultsTab();
}

function renderResultsTab(){
  const s=document.getElementById('tab-results');
  if(!resultsUnlocked){
    s.innerHTML=`
      <div class="admin-lock">
        <h2>&#128274; Results</h2>
        <p>Enter the organiser password to enter match results.</p>
        <input type="password" id="resultsPassInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkResultsPass()">
        <button onclick="checkResultsPass()">Unlock</button>
        <div class="err" id="resultsErr"></div>
      </div>`;
    return;
  }
  s.innerHTML=`<div class="warnb"><strong>Organiser only.</strong> Enter actual results here — everyone's scores update automatically.
    <button onclick="resultsUnlocked=false;renderResultsTab()" style="float:right;background:none;border:1px solid var(--amber-d);border-radius:6px;padding:2px 10px;font-family:'DM Sans',sans-serif;font-size:.72rem;cursor:pointer;color:var(--amber-d)">Lock</button>
  </div>
    <div class="sav" id="resSav" style="text-align:right"></div>
    <div class="sec-title">Group results</div>
    <div class="rg" id="groupResultsGrid"></div>
    <div class="sec-title" style="margin-top:1rem">Match scores <span style="font-size:.68rem;font-weight:400;color:var(--muted)">(home : away)</span></div>
    <div id="matchResultsList"></div>
    <div class="sec-title" style="margin-top:1rem">Knockout results</div>
    <div class="infob" style="margin-bottom:.7rem">Enter the winner of each knockout match. These are used to score knockout predictions.</div>
    <div id="koResultsList"></div>
    <div class="sec-title" style="margin-top:1rem">Champion</div>
    <div class="card"><div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:1.3rem">🏆</span>
      <select id="champResult" onchange="saveChampResult(this.value)" style="flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.875rem">
        <option value="">— select champion —</option>
      </select>
    </div></div>`;
  // Champion dropdown
  const sel=document.getElementById('champResult');
  ALL_TEAMS.forEach(([n,f])=>{const o=document.createElement('option');o.value=n;o.textContent=f+' '+n;sel.appendChild(o);});
  // Group results
  const grid=document.getElementById('groupResultsGrid');
  Object.entries(GROUPS).forEach(([g,teams])=>{
    const card=document.createElement('div');card.className='rc';
    card.innerHTML=`<div class="rh">Group ${g}</div>`+
      [['winner','1st','var(--green)'],['runner','2nd','var(--blue)']].map(([field,label,color])=>`
        <div class="rr"><span style="font-size:.68rem;color:${color};font-weight:500;width:26px;flex-shrink:0">${label}</span>
        <select id="res-${g}-${field}" onchange="saveGroupResult('${g}','${field}',this.value)">
          <option value="">— team —</option>
          ${teams.map(([n,f])=>`<option value="${n}">${f} ${n}</option>`).join('')}
        </select></div>`).join('');
    grid.appendChild(card);
  });
  // Match results
  buildMatchResultsList();
  // KO results
  buildKoResultsList();
}
function buildMatchResultsList(){
  const container=document.getElementById('matchResultsList');if(!container)return;
  const byDay={};MATCHES.forEach(m=>{if(!byDay[m.date])byDay[m.date]=[];byDay[m.date].push(m);});
  container.innerHTML=Object.entries(byDay).map(([day,ms])=>`
    <div style="font-size:.73rem;font-weight:500;color:var(--muted);padding:.3rem 0 .25rem;border-bottom:1px solid var(--border);margin-bottom:.3rem">${day}</div>
    ${ms.map(m=>{
      const hf=GROUPS[m.g]?.find(([n])=>n===m.h)?.[1]||'';
      const af=GROUPS[m.g]?.find(([n])=>n===m.a)?.[1]||'';
      return `<div class="mr-card">
        <span style="font-size:.63rem;color:var(--muted);width:46px;flex-shrink:0">Grp ${m.g}</span>
        <div class="mr-teams"><span>${hf}</span><span style="flex:1;font-size:.73rem">${m.h}</span><span style="font-size:.63rem;color:#9ca3af;padding:0 4px">vs</span><span style="flex:1;font-size:.73rem;text-align:right">${m.a}</span><span>${af}</span></div>
        <div class="mr-score">
          <input class="si" type="number" min="0" max="20" placeholder="0" id="mres-${m.id}-hg" onchange="saveMatchResult('${m.id}','hg',this.value)">
          <span style="font-size:.7rem;color:#9ca3af">:</span>
          <input class="si" type="number" min="0" max="20" placeholder="0" id="mres-${m.id}-ag" onchange="saveMatchResult('${m.id}','ag',this.value)">
        </div>
      </div>`;
    }).join('')}`).join('');
}
function buildKoResultsList(){
  const container=document.getElementById('koResultsList');if(!container)return;
  container.innerHTML=KO_ROUNDS.map(round=>{
    const matches=KO_MATCHES.filter(m=>m.round===round.id);
    return `<div style="font-size:.73rem;font-weight:500;color:var(--muted);padding:.3rem 0 .25rem;border-bottom:1px solid var(--border);margin-bottom:.3rem;margin-top:.6rem">${round.label} · ${round.dates}</div>`+
    matches.map(m=>`
      <div class="ko-res-card">
        <div class="ko-res-label">${m.label} <em>· ${m.venue}</em></div>
        <input placeholder="Winner name" id="ko-res-${m.id}" style="border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-family:'DM Sans',sans-serif;font-size:.78rem;width:160px" onchange="saveKoResult('${m.id}',this.value)">
        <input placeholder="t1" id="ko-t1-${m.id}" style="border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-family:'DM Sans',sans-serif;font-size:.78rem;width:120px" title="Team 1 name (shown to participants)" onchange="saveKoTeams('${m.id}')">
        <input placeholder="t2" id="ko-t2-${m.id}" style="border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-family:'DM Sans',sans-serif;font-size:.78rem;width:120px" title="Team 2 name (shown to participants)" onchange="saveKoTeams('${m.id}')">
      </div>`).join('');
  }).join('');
}
function refreshGroupResultsUI(){Object.keys(GROUPS).forEach(g=>{['winner','runner'].forEach(field=>{const el=document.getElementById(`res-${g}-${field}`);if(el&&results.groups?.[g]?.[field])el.value=results.groups[g][field];});});}
function refreshMatchResultsUI(){MATCHES.forEach(m=>{const mr=results.matches?.[m.id];const hEl=document.getElementById(`mres-${m.id}-hg`),aEl=document.getElementById(`mres-${m.id}-ag`);if(hEl&&mr?.hg!==undefined&&mr.hg!=='')hEl.value=mr.hg;if(aEl&&mr?.ag!==undefined&&mr.ag!=='')aEl.value=mr.ag;});}
function refreshKoResultsUI(){KO_MATCHES.forEach(m=>{const r=results.ko?.[m.id];const el=document.getElementById(`ko-res-${m.id}`),t1=document.getElementById(`ko-t1-${m.id}`),t2=document.getElementById(`ko-t2-${m.id}`);if(el&&r?.winner)el.value=r.winner;if(t1&&r?.t1)t1.value=r.t1;if(t2&&r?.t2)t2.value=r.t2;});}
async function saveGroupResult(g,field,val){if(!results.groups)results.groups={};if(!results.groups[g])results.groups[g]={};results.groups[g][field]=val;setResSaving('saving');await saveResults();}
async function saveMatchResult(id,field,val){if(!results.matches)results.matches={};if(!results.matches[id])results.matches[id]={};results.matches[id][field]=val===''?'':parseInt(val)||0;setResSaving('saving');await saveResults();}
async function saveKoResult(id,val){if(!results.ko)results.ko={};if(!results.ko[id])results.ko[id]={};results.ko[id].winner=val;setResSaving('saving');await saveResults();renderKnockoutList();}
async function saveKoTeams(id){if(!results.ko)results.ko={};if(!results.ko[id])results.ko[id]={};results.ko[id].t1=document.getElementById(`ko-t1-${id}`)?.value||'';results.ko[id].t2=document.getElementById(`ko-t2-${id}`)?.value||'';setResSaving('saving');await saveResults();renderKnockoutList();}
async function saveChampResult(val){results.champion=val;setResSaving('saving');await saveResults();}

// ── COPY ──────────────────────────────────────────────────────────────
function copyPicks(){
  let t=`⚽ World Cup 2026 Pool — ${state.name||'My picks'}\n\nGROUP PICKS\n`;
  Object.entries(GROUPS).forEach(([g,teams])=>{const w=teams.find(([n])=>state.picks[g][n]===1);const r=teams.find(([n])=>state.picks[g][n]===2);t+=`Group ${g}: 1st→${w?w[0]:'?'} | 2nd→${r?r[0]:'?'}\n`;});
  t+=`\nMATCH PREDICTIONS (${Object.values(state.mpreds).filter(v=>v!=='').length}/72)\n`;
  MATCHES.forEach(m=>{const p=state.mpreds[m.id];if(p)t+=`${m.h} vs ${m.a}: ${p==='h'?m.h+' win':p==='d'?'Draw':m.a+' win'}\n`;});
  t+=`\nKNOCKOUT PREDICTIONS (${Object.values(state.kopreds).filter(v=>v!=='').length}/32)\n`;
  KO_MATCHES.forEach(m=>{const p=state.kopreds[m.id];if(p)t+=`${m.label}: ${p}\n`;});
  if(state.champion){const ct=ALL_TEAMS.find(([n])=>n===state.champion);t+=`\n🏆 Champion: ${ct?.[1]||''} ${state.champion}`;}
  navigator.clipboard.writeText(t).then(()=>showToast('Copied!')).catch(()=>showToast('Copy failed'));
}

init();
</script>
